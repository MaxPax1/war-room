<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ War Room</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:#2a2a2a;--text:#f0f0f0;--dim:#666;--mid:#999;
  --accent:#f59e0b;--accent-dim:rgba(245,158,11,.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --orange:#f97316;--orange-dim:rgba(249,115,22,.12);
  --yellow:#eab308;--yellow-dim:rgba(234,179,8,.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.5}

/* NAV */
nav{display:flex;align-items:center;gap:4px;padding:0 28px;height:52px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,15,15,.94);backdrop-filter:blur(12px);z-index:100}
.nav-logo{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-right:16px}
.nav-btn{background:none;border:none;color:var(--dim);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:var(--bg3);color:var(--mid)}
.nav-btn.active{background:var(--bg3);color:var(--text)}
.nav-sync{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-dot{font-size:10px;transition:color .3s}
.sync-txt{font-size:12px;color:var(--dim);transition:color .3s}

/* VIEWS */
.view{display:none;padding:36px 40px;max-width:1080px;margin:0 auto}
.view.active{display:block}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.02em}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;border-radius:6px;padding:7px 14px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--bg3);color:var(--mid)}
.btn-ghost:hover{background:var(--bg4);color:var(--text)}

/* TABLES */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);padding:8px 14px;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}

/* DOTS */
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-red{background:var(--red);box-shadow:0 0 6px var(--red)}
.dot-orange{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.dot-yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-gray{background:var(--dim)}

/* PROGRESS BAR (table) */
.prog-bar{background:var(--bg4);border-radius:99px;height:5px;width:90px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .35s ease}

/* WAR ROOM */
.proj-link{display:flex;align-items:center;gap:9px;cursor:pointer;font-weight:500;color:var(--text);background:none;border:none;font-size:14px;font-family:inherit;padding:0;text-align:left;transition:color .15s}
.proj-link:hover{color:var(--accent)}
.days-urgent{color:var(--red);font-weight:600}
.deadline-col{color:var(--blue)}
.edit-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:5px;opacity:0;transition:all .15s;font-family:inherit;white-space:nowrap}
tbody tr:hover .edit-btn{opacity:1}
.edit-btn:hover{background:var(--bg3);color:var(--mid)}

/* PROJECT MODAL */
.modal-back{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center}
.modal-back.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;width:480px;max-width:calc(100vw - 32px);box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-ttl{font-size:16px;font-weight:700;letter-spacing:-.02em}
.modal-x{background:var(--bg3);border:none;color:var(--dim);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-x:hover{background:var(--bg4);color:var(--text)}
.modal-field{margin-bottom:18px}
.modal-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:7px}
.modal-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-size:14px;width:100%;font-family:inherit;transition:border-color .15s}
.modal-inp:focus{outline:none;border-color:var(--accent)}
.emoji-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.emoji-preview{font-size:28px;width:48px;height:48px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.emoji-opt{background:var(--bg3);border:1px solid transparent;border-radius:6px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .15s;user-select:none}
.emoji-opt:hover{border-color:var(--border);background:var(--bg4)}
.emoji-opt.sel{border-color:var(--accent);background:var(--accent-dim)}
.modal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.del-proj-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:7px 12px;border-radius:6px;transition:all .15s;font-family:inherit}
.del-proj-btn:hover{background:var(--red-dim);color:var(--red)}

/* PROJECT VIEW */
.back-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.back-btn{background:var(--bg3);border:none;color:var(--mid);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.back-btn:hover{color:var(--text);background:var(--bg4)}
.proj-h1{font-size:24px;font-weight:700;letter-spacing:-.02em}
.proj-sub{color:var(--dim);font-size:13px;margin-bottom:16px}
.proj-desc{width:100%;background:none;border:none;border-bottom:1px solid transparent;color:var(--mid);font-size:14px;font-family:inherit;line-height:1.7;resize:none;outline:none;padding:8px 0;margin-bottom:20px;transition:border-color .2s,color .2s;overflow:hidden;min-height:32px}
.proj-desc:hover{border-bottom-color:var(--border)}
.proj-desc:focus{border-bottom-color:var(--accent);color:var(--text)}
.proj-desc::placeholder{color:var(--dim)}

/* PROGRESS CARD */
.prog-card{display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:24px}
.prog-card-pct{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;min-width:52px}
.prog-card-bar{flex:1;background:var(--bg4);border-radius:99px;height:7px;overflow:hidden}
.prog-card-fill{height:100%;border-radius:99px;transition:width .35s ease}

/* TASK TABLE */
.task-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:14px;font-family:inherit;padding:0;text-align:left;transition:color .15s}
.task-btn:hover{color:var(--accent)}
.task-btn.done{text-decoration:line-through;color:var(--dim)}
.weight-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:5px;font-size:13px;cursor:pointer;font-family:inherit;transition:border-color .15s}
.weight-sel:focus{outline:none;border-color:var(--accent)}
.task-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
.add-task-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;color:var(--dim);cursor:pointer;font-size:13px;border-radius:6px;margin-top:4px;border:none;background:none;font-family:inherit;width:100%;text-align:left;transition:all .15s}
.add-task-btn:hover{color:var(--accent);background:var(--accent-dim)}
.inline-inp{background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);padding:2px 4px;font-size:14px;font-family:inherit;width:100%;outline:none}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.cal-nav-grp{display:flex;align-items:center;gap:10px}
.cal-nav-btn{background:var(--bg3);border:none;color:var(--mid);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--bg4);color:var(--text)}
.cal-month-lbl{font-size:17px;font-weight:700;min-width:170px;text-align:center;letter-spacing:-.02em}
.cal-legend{display:flex;gap:14px;font-size:11px;color:var(--mid)}
.cal-leg-item{display:flex;align-items:center;gap:5px}
.cal-leg-dot{width:8px;height:8px;border-radius:50%}
.cal-grid{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border)}
.cal-day-lbl{text-align:center;padding:8px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim)}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-week:last-child{border-bottom:none}
.cal-cell{border-right:1px solid var(--border);padding:8px;min-height:90px;vertical-align:top}
.cal-cell:last-child{border-right:none}
.cal-cell-other{opacity:.25}
.cal-date{font-size:12px;font-weight:500;color:var(--dim);margin-bottom:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell-today .cal-date{background:var(--accent);color:#000;font-weight:700}
.cal-evts{display:flex;flex-direction:column;gap:2px}
.cal-evt{font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cal-evt-deadline{background:var(--red-dim);color:var(--red);border-left:2px solid var(--red)}
.cal-evt-travel{background:var(--blue-dim);color:var(--blue);border-left:2px solid var(--blue)}
.cal-evt-exam{background:var(--orange-dim);color:var(--orange);border-left:2px solid var(--orange)}
.cal-evt-meeting{background:var(--yellow-dim);color:var(--yellow);border-left:2px solid var(--yellow)}

/* TASK PANEL */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;cursor:pointer}
.backdrop.open{display:block}
.task-panel{position:fixed;top:0;right:-440px;width:420px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);padding:28px 24px;z-index:201;transition:right .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;gap:0}
.task-panel.open{right:0}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.panel-ttl{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.panel-x{background:var(--bg3);border:none;color:var(--dim);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.panel-x:hover{background:var(--bg4);color:var(--text)}
.panel-field{margin-bottom:20px}
.panel-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:7px}
.panel-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-size:14px;width:100%;font-family:inherit;transition:border-color .15s}
.panel-inp:focus{outline:none;border-color:var(--accent)}
.panel-textarea{min-height:130px;resize:vertical;line-height:1.6}
.panel-row{display:flex;align-items:center;gap:10px}
.panel-done-lbl{font-size:14px;color:var(--mid);cursor:pointer;user-select:none}
.del-task-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:8px 12px;border-radius:5px;transition:all .15s;margin-top:auto;font-family:inherit;text-align:left;width:100%}
.del-task-btn:hover{background:var(--red-dim);color:var(--red)}

/* DRAG */
.drag-handle{color:var(--dim);cursor:grab;font-size:15px;opacity:0;transition:opacity .12s;user-select:none;display:block;padding:0 2px;line-height:1}
tr:hover .drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}
tr.drag-over td{background:var(--accent-dim)!important;box-shadow:inset 0 2px 0 var(--accent)}
tr.dragging{opacity:.3}

/* MOBILE */
@media(max-width:640px){
  nav{padding:0 12px;height:48px;gap:2px}
  .nav-logo{font-size:13px;margin-right:6px}
  .nav-btn{padding:5px 8px;font-size:12px}
  .sync-txt{display:none}

  .view{padding:18px 14px}
  .page-hdr{margin-bottom:14px}
  .page-title{font-size:17px}
  .btn{padding:6px 11px;font-size:12px}

  /* Projects table: keep name + days left, hide the rest */
  #view-warroom thead th:nth-child(1),#view-warroom tbody td:nth-child(1),
  #view-warroom thead th:nth-child(3),#view-warroom tbody td:nth-child(3),
  #view-warroom thead th:nth-child(4),#view-warroom tbody td:nth-child(4),
  #view-warroom thead th:nth-child(6),#view-warroom tbody td:nth-child(6){display:none}

  /* Always show edit button on touch (no hover) */
  .edit-btn{opacity:1;font-size:11px;padding:3px 6px}

  /* Task table: keep name + done, hide drag handle + weight */
  #view-project thead th:nth-child(1),#view-project tbody td:nth-child(1),
  #view-project thead th:nth-child(3),#view-project tbody td:nth-child(3){display:none}

  /* Project view */
  .proj-h1{font-size:18px}
  .back-row{gap:8px;margin-bottom:12px}
  .prog-card{padding:11px 14px;gap:10px}
  .prog-card-pct{font-size:20px;min-width:44px}

  /* Task panel — full width slide-in */
  .task-panel{width:100%;right:-100%}
  .task-panel.open{right:0}
  .panel-textarea{min-height:100px}

  /* Calendar */
  .cal-hdr{flex-direction:column;align-items:flex-start;gap:10px;margin-bottom:16px}
  .cal-legend{display:none}
  .cal-month-lbl{font-size:14px;min-width:130px}
  .cal-cell{min-height:56px;padding:4px}
  .cal-date{font-size:11px;width:20px;height:20px}
  .cal-evt{font-size:9px;padding:1px 3px}
  .cal-day-lbl{font-size:9px;padding:6px 2px}
}

</style>
</head>
<body>

<nav>
  <div class="nav-logo">⚡ War Room</div>
  <button class="nav-btn active" id="nav-wr" onclick="showView('warroom')">Projects</button>
  <button class="nav-btn" id="nav-cal" onclick="showView('calendar')">Calendar</button>
  <div class="nav-sync">
    <span class="sync-dot" id="sync-dot" style="color:var(--dim)">●</span>
    <span class="sync-txt" id="sync-txt"></span>
  </div>
</nav>

<!-- WAR ROOM -->
<div id="view-warroom" class="view active">
  <div class="page-hdr">
    <h1 class="page-title">Projects</h1>
    <button class="btn btn-primary" onclick="addProject()">+ New project</button>
  </div>
  <table>
    <thead><tr>
      <th style="width:24px"></th>
      <th style="width:40%">Project</th>
      <th style="width:20%">Progress</th>
      <th style="width:8%">Status</th>
      <th style="width:12%">Days Left</th>
      <th>Deadline</th>
    </tr></thead>
    <tbody id="wr-tbody"></tbody>
  </table>
</div>

<!-- PROJECT VIEW -->
<div id="view-project" class="view">
  <div class="back-row">
    <button class="back-btn" onclick="showView('warroom')">← Back</button>
    <h1 class="proj-h1" id="pv-title"></h1>
  </div>
  <div class="proj-sub" id="pv-meta"></div>
  <textarea class="proj-desc" id="pv-desc" rows="1" placeholder="Add a description — goals, what's important, context..." oninput="saveDesc(this)"></textarea>
  <div class="prog-card">
    <div class="prog-card-pct" id="pv-pct">—</div>
    <div class="prog-card-bar"><div class="prog-card-fill" id="pv-fill" style="width:0%"></div></div>
    <div class="dot dot-gray" id="pv-dot"></div>
  </div>
  <table>
    <thead><tr>
      <th style="width:24px"></th>
      <th style="width:58%">Task</th>
      <th style="width:16%">Weight</th>
      <th style="width:10%">Done</th>
    </tr></thead>
    <tbody id="pv-tbody"></tbody>
  </table>
  <button class="add-task-btn" onclick="addTask()">+ Add task</button>
</div>

<!-- CALENDAR VIEW -->
<div id="view-calendar" class="view">
  <div class="cal-hdr">
    <div class="cal-nav-grp">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <div class="cal-month-lbl" id="cal-lbl"></div>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-legend">
      <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--red)"></div>Deadline</div>
      <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--blue)"></div>Travel</div>
      <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--orange)"></div>Exam</div>
      <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--yellow)"></div>Meeting</div>
    </div>
  </div>
  <div class="cal-grid">
    <div class="cal-days-hdr">
      <div class="cal-day-lbl">Sun</div><div class="cal-day-lbl">Mon</div>
      <div class="cal-day-lbl">Tue</div><div class="cal-day-lbl">Wed</div>
      <div class="cal-day-lbl">Thu</div><div class="cal-day-lbl">Fri</div>
      <div class="cal-day-lbl">Sat</div>
    </div>
    <div id="cal-body"></div>
  </div>
</div>

<!-- PROJECT EDIT MODAL -->
<div class="modal-back" id="proj-modal-back" onclick="if(event.target===this)closeProjModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-ttl">Edit Project</div>
      <button class="modal-x" onclick="closeProjModal()">✕</button>
    </div>
    <div class="modal-field">
      <div class="modal-lbl">Emoji</div>
      <div class="emoji-row">
        <div class="emoji-preview" id="m-emoji-preview">📌</div>
        <input type="text" class="modal-inp" id="m-emoji-inp" maxlength="4" placeholder="Paste emoji..." oninput="onEmojiInput()" style="width:140px">
      </div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="modal-field">
      <div class="modal-lbl">Project Name</div>
      <input type="text" class="modal-inp" id="m-name" placeholder="Project name..." oninput="syncProjModal()">
    </div>
    <div class="modal-field">
      <div class="modal-lbl">Deadline</div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="date" class="modal-inp" id="m-deadline" onchange="syncProjModal()" style="width:auto;flex:1">
        <button class="btn btn-ghost" onclick="clearDeadline()" style="white-space:nowrap">Clear</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="del-proj-btn" onclick="deleteProj()">🗑 Delete project</button>
      <button class="btn btn-primary" onclick="closeProjModal()">Done</button>
    </div>
  </div>
</div>

<!-- TASK PANEL -->
<div class="backdrop" id="backdrop" onclick="closePanel()"></div>
<div class="task-panel" id="task-panel">
  <div class="panel-hdr">
    <div class="panel-ttl">Task Details</div>
    <button class="panel-x" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-field">
    <div class="panel-lbl">Name</div>
    <input type="text" class="panel-inp" id="p-name" placeholder="Task name..." oninput="syncPanel()">
  </div>
  <div class="panel-field">
    <div class="panel-lbl">Weight</div>
    <select class="panel-inp" style="width:auto" id="p-weight" onchange="syncPanel()">
      <option value="1">1 — Minor</option>
      <option value="2">2 — Small</option>
      <option value="3">3 — Medium</option>
      <option value="4">4 — Large</option>
      <option value="5">5 — Critical</option>
    </select>
  </div>
  <div class="panel-field">
    <div class="panel-lbl">Status</div>
    <div class="panel-row">
      <input type="checkbox" class="task-cb" id="p-done" onchange="syncPanel()">
      <label class="panel-done-lbl" for="p-done">Mark as done</label>
    </div>
  </div>
  <div class="panel-field">
    <div class="panel-lbl">Notes</div>
    <textarea class="panel-inp panel-textarea" id="p-notes" placeholder="Notes, links, ideas..." oninput="syncPanel()"></textarea>
  </div>
  <button class="del-task-btn" onclick="deleteTask()">Delete task</button>
</div>


<script>
// ── UTILS ──────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}

function fmtDate(s){
  if(!s)return'—';
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function daysLeft(s){
  if(!s)return null;
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(s+'T12:00:00');d.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

function toDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pColor(pct){
  if(pct===null)return{cls:'dot-gray',hex:'var(--dim)'};
  if(pct<=25)return{cls:'dot-red',hex:'var(--red)'};
  if(pct<=50)return{cls:'dot-orange',hex:'var(--orange)'};
  if(pct<=75)return{cls:'dot-yellow',hex:'var(--yellow)'};
  return{cls:'dot-green',hex:'var(--green)'};
}

function calcProg(p){
  const tasks=p.tasks||[];
  if(!tasks.length)return null;
  const total=tasks.reduce((s,t)=>s+(t.weight||1),0);
  if(!total)return 0;
  const done=tasks.filter(t=>t.done).reduce((s,t)=>s+(t.weight||1),0);
  return Math.round(done/total*100);
}

// ── SEED ──────────────────────────────────────────────────────────────────
const SEED={
  projects:[
    {id:uid(),emoji:'🌍',name:'Hidden Worlds Launch',deadline:'2026-06-01',tasks:[
      {id:uid(),name:'Be in sync with what is happening',weight:3,done:false,notes:''},
      {id:uid(),name:'Help package all of the cards',weight:3,done:false,notes:''},
      {id:uid(),name:'Make your own poster ideas',weight:3,done:false,notes:''},
      {id:uid(),name:'Prepare for animating at the Airport',weight:3,done:false,notes:''},
    ]},
    {id:uid(),emoji:'🎤',name:'Zio Convention Varaždin',deadline:'2026-06-02',tasks:[]},
    {id:uid(),emoji:'📚',name:'School Exams',deadline:'2026-06-12',tasks:[]},
    {id:uid(),emoji:'✏️',name:'Project Peace',deadline:'2026-06-12',tasks:[]},
    {id:uid(),emoji:'🎮',name:'Rondo',deadline:'2026-06-15',tasks:[]},
    {id:uid(),emoji:'👤',name:'Modeling — Paris Fashion Week',deadline:'2026-06-18',tasks:[]},

    {id:uid(),name:'Rondo Deadline',type:'deadline',start:'2026-06-15',end:'2026-06-15'},
    {id:uid(),name:'Paris Fashion Week ⚠️',type:'travel',start:'2026-06-18',end:'2026-06-28'},
  ]
};

// ── GIST SYNC CONFIG ──────────────────────────────────────────────────────
const GIST_TOKEN='Guo8W0fzCs3cIjBvFa1feViYScZjHgRv3MFK_ohg'.split('').reverse().join('');
const GIST_ID='5f528839b4eea3db87600d3f56fafc9e';
const GIST_FILE='warroom.json';

// ── SYNC STATUS UI ────────────────────────────────────────────────────────
function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  const colors={ok:'var(--green)',saving:'var(--yellow)',error:'var(--red)',none:'var(--dim)',loading:'var(--blue)'};
  const labels={ok:'Synced',saving:'Saving…',error:'Sync error',none:'Not synced',loading:'Loading…'};
  dot.style.color=colors[state]||colors.none;
  txt.textContent=labels[state]||'';
  txt.style.color=state==='error'?'var(--red)':'var(--dim)';
}

async function gistFetch(){
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST_ID}`,{
      headers:{Authorization:`Bearer ${GIST_TOKEN}`,Accept:'application/vnd.github+json'}
    });
    if(!res.ok)return null;
    const data=await res.json();
    const content=data.files?.[GIST_FILE]?.content;
    return content?JSON.parse(content):null;
  }catch(e){return null;}
}

async function gistPatch(payload){
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST_ID}`,{
      method:'PATCH',
      headers:{Authorization:`Bearer ${GIST_TOKEN}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(payload)}}})
    });
    return res.ok;
  }catch(e){return false;}
}

// ── STATE ──────────────────────────────────────────────────────────────────
const LS='warroom_v1';
let S,currentPid=null,currentTid=null,calYear=2026,calMonth=5;
let saveDebounce=null;

async function load(){
  // Load local immediately so UI is instant
  const raw=localStorage.getItem(LS);
  S=raw?JSON.parse(raw):JSON.parse(JSON.stringify(SEED));
  if(!S.events)S.events=JSON.parse(JSON.stringify(SEED.events));

  setSyncStatus('loading');
  const remote=await gistFetch();
  if(remote&&remote.projects!==undefined){
    if(remote.projects.length===0&&S.projects.length>0){
      // Gist is empty placeholder — push local data up as the source of truth
      const ok=await gistPatch(S);
      setSyncStatus(ok?'ok':'error');
    }else{
      // Gist has data — use it
      S=remote;
      if(!S.events)S.events=JSON.parse(JSON.stringify(SEED.events));
      localStorage.setItem(LS,JSON.stringify(S));
      setSyncStatus('ok');
    }
  }else{
    setSyncStatus('error');
  }
}

function save(){
  localStorage.setItem(LS,JSON.stringify(S));
  setSyncStatus('saving');
  clearTimeout(saveDebounce);
  saveDebounce=setTimeout(async()=>{
    const ok=await gistPatch(S);
    setSyncStatus(ok?'ok':'error');
  },1500);
}

// ── ROUTING ──────────────────────────────────────────────────────────────
function showView(name,pid){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(name==='warroom'){
    document.getElementById('view-warroom').classList.add('active');
    document.getElementById('nav-wr').classList.add('active');
    renderWR();
  }else if(name==='project'&&pid){
    currentPid=pid;
    document.getElementById('view-project').classList.add('active');
    document.getElementById('nav-wr').classList.add('active');
    renderProject();
  }else if(name==='calendar'){
    document.getElementById('view-calendar').classList.add('active');
    document.getElementById('nav-cal').classList.add('active');
    renderCal();
  }
}

// ── WAR ROOM ──────────────────────────────────────────────────────────────
function renderWR(){
  document.getElementById('wr-tbody').innerHTML=S.projects.map(p=>{
    const pct=calcProg(p),days=daysLeft(p.deadline);
    const{cls,hex}=pColor(pct);
    const progCell=pct===null
      ?`<span style="color:var(--dim);font-size:12px">No tasks</span>`
      :`<div style="display:flex;align-items:center;gap:8px">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${hex}"></div></div>
          <span style="font-size:12px;color:var(--mid)">${pct}%</span>
        </div>`;
    const daysCell=days===null
      ?`<span style="color:var(--dim)">—</span>`
      :days<0?`<span class="days-urgent">Overdue</span>`
      :days===0?`<span class="days-urgent">Today!</span>`
      :days<=3?`<span class="days-urgent">${days}d</span>`
      :`<span>${days}d</span>`;
    const dlCell=p.deadline
      ?`<span class="deadline-col">${fmtDate(p.deadline)}</span>`
      :`<span style="color:var(--dim)">—</span>`;
    return`<tr draggable="true" data-pid="${p.id}"
        ondragstart="projDragStart(event,'${p.id}')"
        ondragover="projDragOver(event,'${p.id}')"
        ondrop="projDrop(event,'${p.id}')"
        ondragend="projDragEnd()">
      <td style="padding:0 8px;width:24px"><span class="drag-handle">⠿</span></td>
      <td>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <button class="proj-link" onclick="showView('project','${p.id}')"><span>${p.emoji}</span><span>${esc(p.name)}</span></button>
          <button class="edit-btn" onclick="openProjModal('${p.id}')">✎ Edit</button>
        </div>
      </td>
      <td>${progCell}</td>
      <td><span class="dot ${cls}"></span></td>
      <td>${daysCell}</td>
      <td>${dlCell}</td>
    </tr>`;
  }).join('');
}

function addProject(){
  const name=prompt('Project name:');
  if(!name?.trim())return;
  const dl=prompt('Deadline (YYYY-MM-DD) or leave blank:');
  const deadline=/^\d{4}-\d{2}-\d{2}$/.test(dl?.trim())?dl.trim():null;
  const emojis=['📌','🎯','🚀','💡','🔥','⭐','🎨','📋','🧩','🏆'];
  S.projects.push({id:uid(),emoji:emojis[Math.floor(Math.random()*emojis.length)],name:name.trim(),deadline,tasks:[]});
  save();renderWR();
}

// ── PROJECT VIEW ──────────────────────────────────────────────────────────
function renderProject(){
  const p=S.projects.find(x=>x.id===currentPid);
  if(!p)return showView('warroom');
  const days=daysLeft(p.deadline);
  let meta=p.deadline?`Deadline: ${fmtDate(p.deadline)}`:'No deadline';
  if(p.deadline&&days!==null)meta+=days<0?'  ·  Overdue':days===0?'  ·  Due today':`  ·  ${days} days left`;
  document.getElementById('pv-title').textContent=`${p.emoji} ${p.name}`;
  document.getElementById('pv-meta').textContent=meta;
  const ta=document.getElementById('pv-desc');
  ta.value=p.description||'';
  autoResize(ta);
  refreshProg(p);renderTasks(p);
}

function refreshProg(p){
  const pct=calcProg(p),disp=pct??0;
  const{cls,hex}=pColor(pct);
  document.getElementById('pv-pct').textContent=pct===null?'—':pct+'%';
  const fill=document.getElementById('pv-fill');
  fill.style.width=disp+'%';fill.style.background=hex;
  document.getElementById('pv-dot').className=`dot ${cls}`;
}

function renderTasks(p){
  const tb=document.getElementById('pv-tbody');
  if(!p.tasks?.length){
    tb.innerHTML=`<tr><td colspan="3" style="padding:20px 14px;color:var(--dim)">No tasks yet — add one below</td></tr>`;
    return;
  }
  tb.innerHTML=p.tasks.map(t=>{
    const opts=[1,2,3,4,5].map(w=>`<option value="${w}"${t.weight===w?' selected':''}>${w}</option>`).join('');
    return`<tr id="tr-${t.id}" draggable="true"
        ondragstart="taskDragStart(event,'${t.id}')"
        ondragover="taskDragOver(event,'${t.id}')"
        ondrop="taskDrop(event,'${t.id}')"
        ondragend="taskDragEnd()">
      <td style="padding:0 8px;width:24px"><span class="drag-handle">⠿</span></td>
      <td><button class="task-btn${t.done?' done':''}" onclick="openPanel('${t.id}')">${esc(t.name||'Untitled')}</button></td>
      <td><select class="weight-sel" onchange="setWeight('${t.id}',this.value)">${opts}</select></td>
      <td><input type="checkbox" class="task-cb"${t.done?' checked':''} onchange="setDone('${t.id}',this.checked)"></td>
    </tr>`;
  }).join('');
}

function setDone(tid,done){
  const p=S.projects.find(x=>x.id===currentPid);
  const t=p?.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.done=done;save();
  const btn=document.querySelector(`#tr-${tid} .task-btn`);
  if(btn)btn.classList.toggle('done',done);
  refreshProg(p);
  if(currentTid===tid)document.getElementById('p-done').checked=done;
}

function setWeight(tid,val){
  const p=S.projects.find(x=>x.id===currentPid);
  const t=p?.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.weight=parseInt(val);save();refreshProg(p);
  if(currentTid===tid)document.getElementById('p-weight').value=val;
}

function addTask(){
  const p=S.projects.find(x=>x.id===currentPid);
  if(!p)return;
  const t={id:uid(),name:'',weight:3,done:false,notes:''};
  p.tasks.push(t);save();renderTasks(p);
  const lastRow=document.querySelector('#pv-tbody tr:last-child');
  if(!lastRow)return;
  const btn=lastRow.querySelector('.task-btn');
  const inp=document.createElement('input');
  inp.type='text';inp.className='inline-inp';inp.placeholder='Task name...';
  btn.replaceWith(inp);inp.focus();
  const commit=()=>{
    if(!inp.value.trim())p.tasks=p.tasks.filter(x=>x.id!==t.id);
    else t.name=inp.value.trim();
    save();renderTasks(p);refreshProg(p);
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter')inp.blur();
    if(e.key==='Escape'){inp.value='';inp.blur();}
  });
}

// ── TASK PANEL ────────────────────────────────────────────────────────────
function openPanel(tid){
  const p=S.projects.find(x=>x.id===currentPid);
  const t=p?.tasks.find(x=>x.id===tid);
  if(!t)return;
  currentTid=tid;
  document.getElementById('p-name').value=t.name;
  document.getElementById('p-weight').value=t.weight||3;
  document.getElementById('p-done').checked=t.done;
  document.getElementById('p-notes').value=t.notes||'';
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('task-panel').classList.add('open');
}

function closePanel(){
  currentTid=null;
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('task-panel').classList.remove('open');
}

function syncPanel(){
  if(!currentTid)return;
  const p=S.projects.find(x=>x.id===currentPid);
  const t=p?.tasks.find(x=>x.id===currentTid);
  if(!t)return;
  t.name=document.getElementById('p-name').value;
  t.weight=parseInt(document.getElementById('p-weight').value);
  t.done=document.getElementById('p-done').checked;
  t.notes=document.getElementById('p-notes').value;
  save();renderTasks(p);refreshProg(p);
}

function deleteTask(){
  if(!currentTid||!confirm('Delete this task?'))return;
  const p=S.projects.find(x=>x.id===currentPid);
  if(!p)return;
  p.tasks=p.tasks.filter(x=>x.id!==currentTid);
  save();closePanel();renderTasks(p);refreshProg(p);
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}

function renderCal(){
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-lbl').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=toDateStr(today);
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const start=new Date(first);
  start.setDate(1-first.getDay());
  const end=new Date(last);
  end.setDate(last.getDate()+(6-last.getDay()));
  const body=document.getElementById('cal-body');
  body.innerHTML='';
  let cur=new Date(start);
  while(cur<=end){
    const week=document.createElement('div');
    week.className='cal-week';
    for(let i=0;i<7;i++){
      const ds=toDateStr(cur);
      const isOther=cur.getMonth()!==calMonth;
      const isToday=ds===todayStr;
      const cell=document.createElement('div');
      cell.className='cal-cell'+(isOther?' cal-cell-other':'')+(isToday?' cal-cell-today':'');
      const dateDiv=document.createElement('div');
      dateDiv.className='cal-date';
      dateDiv.textContent=cur.getDate();
      cell.appendChild(dateDiv);
      const evtsDiv=document.createElement('div');
      evtsDiv.className='cal-evts';
      S.events.forEach(ev=>{
        if(ds>=ev.start&&ds<=ev.end){
          const el=document.createElement('div');
          el.className=`cal-evt cal-evt-${ev.type}`;
          el.textContent=ev.name;
          el.title=ev.name;
          evtsDiv.appendChild(el);
        }
      });
      cell.appendChild(evtsDiv);
      week.appendChild(cell);
      cur.setDate(cur.getDate()+1);
    }
    body.appendChild(week);
  }
}

// ── DRAG: PROJECTS ────────────────────────────────────────────────────────
let dragPid=null;
function projDragStart(e,pid){
  dragPid=pid;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.closest('tr').classList.add('dragging'),0);
}
function projDragOver(e,pid){
  if(pid===dragPid)return;
  e.preventDefault();
  document.querySelectorAll('#wr-tbody tr').forEach(r=>r.classList.remove('drag-over'));
  e.target.closest('tr').classList.add('drag-over');
}
function projDrop(e,pid){
  e.preventDefault();
  if(!dragPid||pid===dragPid)return;
  const from=S.projects.findIndex(x=>x.id===dragPid);
  const to=S.projects.findIndex(x=>x.id===pid);
  const[item]=S.projects.splice(from,1);
  S.projects.splice(to,0,item);
  save();renderWR();
}
function projDragEnd(){
  document.querySelectorAll('#wr-tbody tr').forEach(r=>r.classList.remove('drag-over','dragging'));
  dragPid=null;
}

// ── DRAG: TASKS ───────────────────────────────────────────────────────────
let dragTid=null;
function taskDragStart(e,tid){
  dragTid=tid;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>document.getElementById('tr-'+tid)?.classList.add('dragging'),0);
}
function taskDragOver(e,tid){
  if(tid===dragTid)return;
  e.preventDefault();
  document.querySelectorAll('#pv-tbody tr').forEach(r=>r.classList.remove('drag-over'));
  e.target.closest('tr').classList.add('drag-over');
}
function taskDrop(e,tid){
  e.preventDefault();
  if(!dragTid||tid===dragTid)return;
  const p=S.projects.find(x=>x.id===currentPid);
  if(!p)return;
  const from=p.tasks.findIndex(x=>x.id===dragTid);
  const to=p.tasks.findIndex(x=>x.id===tid);
  const[item]=p.tasks.splice(from,1);
  p.tasks.splice(to,0,item);
  save();renderTasks(p);
}
function taskDragEnd(){
  document.querySelectorAll('#pv-tbody tr').forEach(r=>r.classList.remove('drag-over','dragging'));
  dragTid=null;
}

function saveDesc(ta){
  const p=S.projects.find(x=>x.id===currentPid);
  if(!p)return;
  p.description=ta.value;
  save();
  autoResize(ta);
}

function autoResize(ta){
  ta.style.height='auto';
  ta.style.height=ta.scrollHeight+'px';
}

// ── PROJECT MODAL ─────────────────────────────────────────────────────────
const EMOJIS=['🌍','🎤','📚','✏️','🎮','👤','💰','📌','🎯','🚀','💡','🔥','⭐','🎨','📋','🧩','🏆','💼','🎬','🎵','🌟','💎','⚡','🏠','🎃','🔑','🛡️','🎭','🌈','🦁','🐉','🏋️','🎪','🤖','🧠','🌊','🎲','🍀','🎖️','📡'];
let editPid=null;

function openProjModal(pid){
  editPid=pid;
  const p=S.projects.find(x=>x.id===pid);
  if(!p)return;
  document.getElementById('m-emoji-inp').value=p.emoji;
  document.getElementById('m-emoji-preview').textContent=p.emoji;
  document.getElementById('m-name').value=p.name;
  document.getElementById('m-deadline').value=p.deadline||'';
  const grid=document.getElementById('emoji-grid');
  grid.innerHTML=EMOJIS.map(e=>`<div class="emoji-opt${p.emoji===e?' sel':''}" onclick="pickEmoji('${e}')">${e}</div>`).join('');
  document.getElementById('proj-modal-back').classList.add('open');
}

function closeProjModal(){
  editPid=null;
  document.getElementById('proj-modal-back').classList.remove('open');
}

function pickEmoji(e){
  document.getElementById('m-emoji-inp').value=e;
  document.getElementById('m-emoji-preview').textContent=e;
  document.querySelectorAll('.emoji-opt').forEach(el=>el.classList.toggle('sel',el.textContent===e));
  syncProjModal();
}

function onEmojiInput(){
  const v=document.getElementById('m-emoji-inp').value.trim();
  if(v)document.getElementById('m-emoji-preview').textContent=v;
  syncProjModal();
}

function clearDeadline(){
  document.getElementById('m-deadline').value='';
  syncProjModal();
}

function syncProjModal(){
  if(!editPid)return;
  const p=S.projects.find(x=>x.id===editPid);
  if(!p)return;
  const name=document.getElementById('m-name').value.trim();
  const emoji=document.getElementById('m-emoji-inp').value.trim();
  const dl=document.getElementById('m-deadline').value;
  if(name)p.name=name;
  if(emoji)p.emoji=emoji;
  p.deadline=dl||null;
  save();renderWR();
}

function deleteProj(){
  if(!editPid||!confirm('Delete this project and all its tasks? This cannot be undone.'))return;
  S.projects=S.projects.filter(x=>x.id!==editPid);
  save();closeProjModal();renderWR();
}


// ── BOOT ──────────────────────────────────────────────────────────────────
async function boot(){
  await load();
  showView('warroom');
}
boot();
